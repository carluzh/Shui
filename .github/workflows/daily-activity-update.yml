name: Daily Activity Update

on:
  schedule:
    - cron: '34 10 * * *'  # Runs at 10:34 UTC daily
  workflow_dispatch:  # Allows manual triggering 

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.PAT }}
      
      - name: Update activity data
        run: |
          NEW_ENTRY="  {
            date: '$(date +%Y-%m-%d)',
            sports: true,
            twitter: true,
            work: true,
            growth: true,
            note: 'To be updated'
          },"
          sed -i "/export const ACTIVITY_DATA: DayActivity\[] = \[/a $NEW_ENTRY" src/data/activityData.ts
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add src/data/activityData.ts
          git commit -m "Add activity placeholder for $(date +'%Y-%m-%d')"
          git push