name: Daily Activity Update

on:
  schedule:
    - cron: '34 10 * * *'  # Runs at 10:34 UTC daily
  workflow_dispatch:  # Allows manual triggering 

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.PAT }}
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      
      - name: Update activity data
        run: |
          python - <<EOF
          import json
          from datetime import datetime

          file_path = 'src/data/activityData.ts'
          
          with open(file_path, 'r') as file:
              content = file.read()
          
          start = content.index('[') + 1
          end = content.rindex(']')
          data = json.loads('[' + content[start:end] + ']')
          
          new_entry = {
              "date": datetime.now().strftime('%Y-%m-%d'),
              "sports": True,
              "twitter": True,
              "work": True,
              "growth": True,
              "note": "To be updated"
          }
          
          data.insert(0, new_entry)
          
          updated_content = content[:start] + json.dumps(data, indent=2)[1:-1] + content[end:]
          
          with open(file_path, 'w') as file:
              file.write(updated_content)
          EOF
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add src/data/activityData.ts
          git commit -m "Add activity placeholder for $(date +'%Y-%m-%d')"
          git push